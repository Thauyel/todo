<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo — Minimal Task Manager</title>
  <meta name="description" content="A beautiful, minimal to-do app to organize your day with elegance." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrapper">
    <!-- Ambient background blobs -->
    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>
    <div class="bg-blob bg-blob--3"></div>

    <header class="app-header" id="app-header">
      <div class="header-top">
        <h1 class="logo">todo<span class="logo-dot">.</span></h1>
        <p class="date-display" id="date-display"></p>
      </div>
      <p class="greeting" id="greeting"></p>
    </header>

    <main class="app-main">
      <!-- Add Task Form -->
      <form class="add-task-form" id="add-task-form" autocomplete="off">
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </span>
          <input
            type="text"
            id="task-input"
            class="task-input"
            placeholder="Add a new task…"
            aria-label="New task text"
            maxlength="200"
          />
          <select id="priority-select" class="priority-select" aria-label="Task priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
          <button type="submit" class="add-btn" id="add-btn" aria-label="Add task">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>
      </form>

      <!-- Filters -->
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all" id="filter-all">All</button>
        <button class="filter-btn" data-filter="active" id="filter-active">Active</button>
        <button class="filter-btn" data-filter="completed" id="filter-completed">Completed</button>
      </div>

      <!-- Task Stats -->
      <div class="task-stats" id="task-stats">
        <span id="stats-text"></span>
        <button class="clear-completed-btn" id="clear-completed-btn">Clear completed</button>
      </div>

      <!-- Task List -->
      <ul class="task-list" id="task-list" aria-label="Task list"></ul>

      <!-- Empty State -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
        <p class="empty-title">No tasks yet</p>
        <p class="empty-subtitle">Add your first task above to get started</p>
      </div>
    </main>

    <footer class="app-footer">
      <p>Drag to reorder &middot; Double-click to edit &middot; Data saved locally</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
